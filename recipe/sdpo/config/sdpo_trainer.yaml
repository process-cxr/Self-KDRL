hydra:
  searchpath:
    - file:///home/work/cxr/Self-KDRL/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# MAX_MODEL_LEN: Template + Prompt + Feedback + Response
max_model_len: 18944

# =============================================================================
# Training Configuration
# =============================================================================

# Model and Data
actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 32
    ppo_micro_batch_size_per_gpu: 4
    policy_loss:
      loss_mode: sdpo
    self_distillation:
      full_logit_distillation: true
      alpha: 0.5
      success_reward_threshold: 1.0
      teacher_regularization: ema
      teacher_update_rate: 0.05
      max_reprompt_len: 10240
      reprompt_truncation: right
      dont_reprompt_on_self_success: false
      remove_thinking_from_demonstration: false
      is_clip: 2.0
      distillation_topk: 100
      distillation_add_tail: true
      include_environment_feedback: false
      environment_feedback_only_without_solution: false

      # Templates
      reprompt_template: |
        {prompt}{solution}{feedback}

        Correctly solve the original question.

      solution_template: |

        Correct solution:

        {successful_previous_attempt}

      feedback_template: |

        The following is feedback from your unsuccessful earlier attempt:

        {feedback_raw}

  optim:
    lr: 1e-5

  model:
    path: Qwen/Qwen2.5-7B-Instruct
    trust_remote_code: true

  ref:
    log_prob_micro_batch_size_per_gpu: 1

  rollout:
    n: 8
    calculate_log_probs: true
    name: vllm
    gpu_memory_utilization: 0.55
    log_prob_micro_batch_size_per_gpu: 1
    max_num_batched_tokens: ${max_model_len}
    max_model_len: ${max_model_len}
    val_kwargs:
      top_p: 0.95
      temperature: 0.6
      n: 4
      do_sample: true

data:
  train_files: ["datasets/tooluse/train.parquet"]
  val_files: ["datasets/tooluse/test.parquet"]
  train_batch_size: 32
  filter_overlong_prompts: true
  max_prompt_length: 2048
  max_response_length: 8192
  shuffle: true
  trust_remote_code: true
  apply_chat_template_kwargs: {"enable_thinking": false}

# =============================================================================
# Hardware Configuration
# =============================================================================

trainer:
  n_gpus_per_node: 1
  nnodes: 1
  project_name: SDPO
  group_name: sdpo
  experiment_name: sdpo
  val_before_train: false
  test_freq: 5
  max_actor_ckpt_to_keep: 1
  total_epochs: 30

# =============================================================================
# Algorithm Configuration
# =============================================================================

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: false
  rollout_correction:
    rollout_is: token
    rollout_is_threshold: 2.0
  use_kl_in_reward: false

# Custom reward function for SDPO (with feedback)
# Note: path is relative to recipe/sdpo/ directory (Ray working dir)
# The __init__.py acts as a dispatcher, automatically selecting the reward function
# based on the data_source field in the dataset.
custom_reward_function:
  path: reward_score/__init__.py
  name: compute_score

critic:
  model:
    path: Qwen/Qwen2.5-7B-Instruct

reward_model:
  use_reward_loop: false
